<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Khóa Học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">🖥️ Test CRUD API Khóa Học (Courses)</h2>
    
    <div class="row">
        <!-- FORM THÊM / SỬA KHÓA HỌC -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0" id="form-title">Thêm Khóa Học Mới</h5>
                </div>
                <div class="card-body">
                    <form id="course-form">
                        <input type="hidden" id="course-id">
                        <div class="mb-3">
                            <label class="form-label">Tên khóa học (*)</label>
                            <input type="text" id="course-name" class="form-control" required maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea id="course-description" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100" id="btn-save">Lưu Khóa Học</button>
                        <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="btn-cancel">Hủy Cập Nhật</button>
                    </form>
                    <div id="form-message" class="mt-3 text-danger"></div>
                </div>
            </div>
        </div>

        <!-- DANH SÁCH KHÓA HỌC -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Danh Sách Khóa Học</h5>
                        <button class="btn btn-sm btn-outline-info" onclick="fetchCourses()">🔄 Làm mới (GET)</button>
                    </div>
                    <table class="table table-hover table-bordered">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Tên Khóa Học</th>
                                <th>Mô Tả</th>
                                <th class="text-center">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody id="course-list">
                            <tr><td colspan="4" class="text-center">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Dựa vào launchSettings.json của bạn, port HTTP là 5257
    const API_URL = 'http://localhost:5257/api/Courses'; 

    // DOM Elements
    const form = document.getElementById('course-form');
    const inputId = document.getElementById('course-id');
    const inputName = document.getElementById('course-name');
    const inputDesc = document.getElementById('course-description');
    const btnCancel = document.getElementById('btn-cancel');
    const formTitle = document.getElementById('form-title');
    const msgDiv = document.getElementById('form-message');
    const tableBody = document.getElementById('course-list');

    // 1. GET ALL: Lấy danh sách khóa học
    async function fetchCourses() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json(); // API của bạn trả về JSON theo chuẩn ApiResponse
            
            if (result.status === 'success') {
                renderTable(result.data); // result.data chứa List<Course>
            } else {
                alert('Lỗi: ' + result.message);
            }
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Lỗi kết nối đến API: ${error.message}. Hãy chắc chắn server đang chạy ở port 5257.</td></tr>`;
        }
    }

    function renderTable(courses) {
        tableBody.innerHTML = '';
        if (courses.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" class="text-center">Chưa có khóa học nào.</td></tr>';
            return;
        }

        courses.forEach(c => {
            const row = `<tr>
                <td>${c.courseId}</td>
                <td><strong>${c.courseName}</strong></td>
                <td>${c.description || ''}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-warning" onclick="editCourse(${c.courseId}, '${c.courseName}', '${c.description || ''}')">Sửa (PUT)</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteCourse(${c.courseId})">Xóa (DELETE)</button>
                </td>
            </tr>`;
            tableBody.insertAdjacentHTML('beforeend', row);
        });
    }

    // 2. CREATE (POST) & UPDATE (PUT)
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msgDiv.innerHTML = '';
        
        const payload = {
            courseName: inputName.value,
            description: inputDesc.value
        };

        const id = inputId.value;
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.status === 'success') {
                resetForm();
                fetchCourses(); // Tải lại bảng sau khi lưu thành công
                alert(result.message);
            } else {
                // Xử lý violations từ DTO validations (nếu có)
                let errorHtml = `Lỗi: ${result.message}<br>`;
                if (result.violations && result.violations.length > 0) {
                    errorHtml += result.violations.map(v => `- ${v}`).join('<br>');
                }
                msgDiv.innerHTML = errorHtml;
            }
        } catch (error) {
            msgDiv.innerHTML = `Lỗi hệ thống: ${error.message}`;
        }
    });

    // 3. DELETE
    async function deleteCourse(id) {
        if (!confirm('Bạn có chắc chắn muốn xóa khóa học ID: ' + id + '?')) return;

        try {
            const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            const result = await response.json();

            if (result.status === 'success') {
                fetchCourses(); // Tải lại bảng sau khi xóa
            } else {
                alert('Lỗi xóa: ' + result.message);
            }
        } catch (error) {
            alert('Lỗi hệ thống khi xóa: ' + error.message);
        }
    }

    // --- CÁC HÀM TIỆN ÍCH ---
    function editCourse(id, name, desc) {
        inputId.value = id;
        inputName.value = name;
        inputDesc.value = desc !== 'null' ? desc : '';
        
        formTitle.textContent = `Cập nhật Khóa học #${id}`;
        btnCancel.classList.remove('d-none');
    }

    btnCancel.addEventListener('click', resetForm);

    function resetForm() {
        form.reset();
        inputId.value = '';
        formTitle.textContent = 'Thêm Khóa Học Mới';
        btnCancel.classList.add('d-none');
        msgDiv.innerHTML = '';
    }

    // Khởi chạy khi load trang
    fetchCourses();
</script>

</body>
</html>
